<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Material Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="android-wrapper">
        <div class="calculator-body">
            
            <input type="text" id="display" readonly placeholder="0">
            
            <div class="buttons-grid">
                <button onclick="clearDisplay()" class="btn-util">C</button>
                <button onclick="appendToDisplay('(')" class="btn-util">( )</button>
                <button onclick="appendToDisplay('%')" class="btn-util">%</button>
                <button onclick="appendToDisplay('/')" class="btn-op">÷</button>
                
                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button onclick="appendToDisplay('*')" class="btn-op">×</button>
                
                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button onclick="appendToDisplay('-')" class="btn-op">−</button>
                
                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button onclick="appendToDisplay('+')" class="btn-op">+</button>
                
                <button onclick="deleteLast()" class="btn-util">⌫</button>
                <button onclick="appendToDisplay('0')">0</button>
                <button onclick="appendToDisplay('.')">.</button>
                <button onclick="calculate()" class="btn-equal">=</button>
            </div>
            
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
